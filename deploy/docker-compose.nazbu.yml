# Nazbu sidecar overlay for a Womola shop server.
#
# Combine it with Womola's own compose so the sidecar joins the same network and
# reaches Mongo as the service host "mongo":
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.nazbu.yml --env-file nazbu.env up -d
#
# It adds ONE container next to Womola. Womola itself is untouched.

services:
  nazbu-sidecar:
    # Build the image once (from the nazbu repo):
    #   docker build -f deploy/Dockerfile.sidecar -t nazbu-sidecar:local .
    image: nazbu-sidecar:local
    container_name: womola_nazbu
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Reuse the EXACT same connection string your backend uses
      # (womola_be/.env.prod -> DB_URI). Guaranteed to work, change streams included.
      NAZBU_URI: "${NAZBU_URI:?set NAZBU_URI to your backend's DB_URI in nazbu.env}"
      NAZBU_DB: "${NAZBU_DB:-womoladb}"
      NAZBU_ROOM: "${NAZBU_ROOM:?set a unique room per shop, e.g. shop-42}"
      NAZBU_NAME: "${NAZBU_NAME:-shop-server}"
      NAZBU_INTERNET: "${NAZBU_INTERNET:-1}"
    networks:
      - womola_internal

# Reuse Womola's network (declared in docker-compose.prod.yml).
networks:
  womola_internal:
