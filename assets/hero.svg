<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3ddc97"/>
    </marker>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ddc97"/>
      <stop offset="1" stop-color="#2f81f7"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="838" height="398" rx="18" fill="#0d1117" stroke="#30363d"/>

  <!-- title -->
  <text x="40" y="66" fill="#ffffff" font-size="42" font-weight="700">Nazbu</text>
  <text x="40" y="98" fill="#8b949e" font-size="17">Deploy any app to a local network. No server. No internet. Real-time sync.</text>

  <!-- crossed-out cloud: internet not needed -->
  <g transform="translate(360,120)">
    <path d="M20,26 a16,16 0 0,1 31,-6 a13,13 0 0,1 12,18 h-46 a13,13 0 0,1 3,-12 z" fill="#161b22" stroke="#484f58"/>
    <line x1="8" y1="6" x2="66" y2="40" stroke="#f85149" stroke-width="3" stroke-linecap="round"/>
    <text x="34" y="60" fill="#8b949e" font-size="12" text-anchor="middle">internet: not needed</text>
  </g>

  <!-- machine A -->
  <g transform="translate(50,210)">
    <rect width="210" height="120" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="20" cy="22" r="4" fill="#f85149"/><circle cx="34" cy="22" r="4" fill="#e3b341"/><circle cx="48" cy="22" r="4" fill="#3fb950"/>
    <text x="20" y="60" fill="#3ddc97" font-size="15" font-weight="600">Machine A</text>
    <text x="20" y="86" fill="#c9d1d9" font-size="13" font-family="ui-monospace,monospace">PARA stock: 5 → 4</text>
    <text x="20" y="106" fill="#8b949e" font-size="12" font-family="ui-monospace,monospace">sale −1  ✓ synced</text>
  </g>

  <!-- machine B -->
  <g transform="translate(580,210)">
    <rect width="210" height="120" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="20" cy="22" r="4" fill="#f85149"/><circle cx="34" cy="22" r="4" fill="#e3b341"/><circle cx="48" cy="22" r="4" fill="#3fb950"/>
    <text x="20" y="60" fill="#2f81f7" font-size="15" font-weight="600">Machine B</text>
    <text x="20" y="86" fill="#c9d1d9" font-size="13" font-family="ui-monospace,monospace">PARA stock: 5 → 4</text>
    <text x="20" y="106" fill="#8b949e" font-size="12" font-family="ui-monospace,monospace">updated itself ✓</text>
  </g>

  <!-- access point (wifi) -->
  <g transform="translate(420,250)" stroke="url(#glow)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-22,0 a22,22 0 0,1 44,0"/>
    <path d="M-13,8 a13,13 0 0,1 26,0"/>
    <circle cx="0" cy="16" r="3" fill="#3ddc97" stroke="none"/>
  </g>
  <text x="420" y="300" fill="#8b949e" font-size="12" text-anchor="middle">LAN · access point</text>

  <!-- sync arrows -->
  <line x1="270" y1="270" x2="392" y2="262" stroke="#3ddc97" stroke-width="2.5" stroke-dasharray="6 5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="448" y1="262" x2="570" y2="270" stroke="#3ddc97" stroke-width="2.5" stroke-dasharray="6 5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="420" y="345" fill="#3ddc97" font-size="13" text-anchor="middle" font-weight="600">peer-to-peer sync</text>

  <!-- pills -->
  <g font-size="12" fill="#c9d1d9">
    <rect x="40" y="360" width="92" height="24" rx="12" fill="#161b22" stroke="#30363d"/><text x="86" y="376" text-anchor="middle">no server</text>
    <rect x="142" y="360" width="104" height="24" rx="12" fill="#161b22" stroke="#30363d"/><text x="194" y="376" text-anchor="middle">offline-first</text>
    <rect x="256" y="360" width="100" height="24" rx="12" fill="#161b22" stroke="#30363d"/><text x="306" y="376" text-anchor="middle">auto re-sync</text>
    <rect x="640" y="360" width="160" height="24" rx="12" fill="#161b22" stroke="#30363d"/><text x="720" y="376" text-anchor="middle">Hypercore · mDNS</text>
  </g>
</svg>
